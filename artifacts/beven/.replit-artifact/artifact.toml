kind = "web"
previewPath = "/"
title = "Beven - Health & Nutrition"
version = "1.0.0"
id = "artifacts/beven"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25233

[services.development]
run = "pnpm --filter @workspace/beven run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beven", "run", "build" ]
publicDir = "artifacts/beven/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25233"
BASE_PATH = "/"
